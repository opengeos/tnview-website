version: 1
project:
  title: Website Title
  # authors:
  #   - name: Author Name
  copyright: '2026'
  exclude:
    - _build
    - Thumbs.db
    - .DS_Store
    - '**.ipynb_checkpoints'
  github: opengeos/myst-website-template
  thebe:
    binder:
      repo: opengeos/myst-website-template
      provider: github
      url: https://mybinder.org
      ref: main
  bibliography:
    - book/references.bib
  toc:
    - file: index.md
    - title: Preface
      children:
        - file: book/preface.md
    - title: Getting Started
      children:
        - file: book/part01/getting-started.md
        - file: book/part01/installation.md
    - title: Examples
      children:
        - file: book/part02/first-example.md
site:
  options:
    logo: logo.png
    logo_dark: logo.png
    favicon: fav.ico
    folders: true
    style: custom.css
    # analytics_google: G-XXX
  template: book-theme
  parts:
    primary_sidebar_footer: ''
